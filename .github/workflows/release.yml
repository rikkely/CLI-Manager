name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "V*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            rust-target: ""
          - platform: macos-14
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/V}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        shell: bash
        run: |
          CHANGELOG=$(node .github/scripts/extract-changelog.js "${{ steps.version.outputs.version }}" || echo "")
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="详见 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md)"
          fi
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # 提高前端构建（tsc && vite build）的 Node 堆上限，避免 macOS runner 上 OOM（退出码 134/SIGABRT）
          NODE_OPTIONS: "--max-old-space-size=4096"
        with:
          tagName: "V__VERSION__"
          releaseName: "CLI-Manager V__VERSION__"
          releaseBody: |
            ## 安装

            | 平台 | 格式 |
            |------|------|
            | Windows | `.msi` 安装包 |
            | macOS (Apple Silicon) | `.dmg` 磁盘映像 |
            | Linux | `.deb` / `.AppImage` |

            > - Windows 首次安装可能触发 SmartScreen 提示，点击"仍要运行"继续
            > - macOS 应用未经 Apple 签名/公证，首次打开可能提示"已损坏"或"无法验证开发者"

            ### macOS 安装说明

            如果已拖入"应用程序"目录，执行：

            ```bash
            xattr -cr /Applications/CLI-Manager.app
            open /Applications/CLI-Manager.app
            ```

            也可以在 Finder 中右键应用图标，选择"打开"，或在"系统设置 → 隐私与安全性"中点击"仍要打开"。

            ## 变更日志

            ${{ steps.changelog.outputs.content }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
